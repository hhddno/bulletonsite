<!DOCTYPE html>
<html lang="fr" data-theme="mineral">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <base href="./" />
  <title>Bulle ton site · Diapo</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://bulletonsite.com/diapo/" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=fraunces:600|inter:400,600" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <p id="file-protocol-warn" hidden>
    Ce diapo ne s’ouvre pas en double-clic. Lancez <code>npm start</code> à la racine du site puis ouvrez
    <a href="http://localhost:3000/diapo/">http://localhost:3000/diapo/</a>,
    ou consultez-le en ligne sur <a href="https://bulletonsite.com/diapo/">bulletonsite.com/diapo</a>.
  </p>

  <a class="diapo-back" href="../" title="Retour au site">← Site</a>

  <div id="rec-ui">
    <button type="button" id="btn-play">Pause</button>
    <button type="button" id="btn-restart">Recommencer</button>
    <button type="button" id="btn-fullscreen">Plein écran</button>
    <button type="button" id="btn-version">Version courte</button>
    <button type="button" id="btn-hide-ui">Masquer (H)</button>
  </div>
  <p id="rec-hint">Chargement…</p>

  <div id="stage-wrap">
    <div id="stage">
      <div id="progress"><div id="progress-bar"></div></div>
    </div>
    <div id="dots"></div>
  </div>

  <script>
    if (location.protocol === 'file:') {
      const w = document.getElementById('file-protocol-warn');
      if (w) {
        w.hidden = false;
        w.style.cssText = 'position:fixed;inset:0;z-index:9999;padding:2rem;background:#1a1f35;color:#fff;font-family:system-ui,sans-serif;line-height:1.6;';
      }
      document.getElementById('rec-ui')?.remove();
      document.getElementById('rec-hint')?.remove();
      document.getElementById('stage-wrap')?.remove();
    }
  </script>
  <script type="module" src="./promo.js"></script>
</body>
</html>
